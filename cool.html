<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>PIReactive | Code Snippets</title>
  <meta name="description" content="Production-ready code snippets and utilities for developers. Free components crafted by PIReactive Tech co.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.1.0/dist/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <style>
    * { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000000; }
    .v-l { width: 1px; height: 100%; background: linear-gradient(to bottom, transparent 0%, transparent 12%, rgba(255,255,255,0.06) 20%, rgba(255,255,255,0.06) 90%, transparent 100%); }
    #m-m { transition: opacity 0.3s ease, visibility 0.3s ease; }
    #m-m.h { opacity: 0; visibility: hidden; }
    #m-m:not(.h) { opacity: 1; visibility: visible; }
    .tab-u { text-decoration: underline; text-underline-offset: 8px; text-decoration-thickness: 2px; }
    .snippet-card { background: transparent; cursor: pointer; transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1); border: 2px solid transparent; }
    .snippet-card:hover { transform: translateY(-4px); }
    .snippet-card.border-white:hover { border-color: #ffffff; }
    .snippet-card.border-green:hover { border-color: #22c55e; }
    .snippet-card.border-orange:hover { border-color: #f97316; }
    .snippet-card.border-sky:hover { border-color: #0ea5e9; }
    .snippet-card.border-purple:hover { border-color: #a855f7; }
    .snippet-preview-mini { aspect-ratio: 16/9; background: #fff; overflow: hidden; pointer-events: none; display: flex; align-items: center; justify-content: center; }
    .snippet-preview-mini iframe { width: 100%; height: 100%; border: none; background: #fff; pointer-events: none; transform: scale(0.65); transform-origin: center; width: 154%; height: 154%; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); backdrop-filter: blur(12px); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.4s cubic-bezier(0.2, 0.9, 0.1, 1); }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-content { background: #0d0d0d; width: 100%; max-width: 1400px; height: 95vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.1, 1); overflow: hidden; border-radius: 24px 24px 0 0; }
    .active .modal-content { transform: translateY(0); }
    .modal-preview { flex: 1; background: #fff; min-height: 0; }
    .modal-preview iframe { width: 100%; height: 100%; border: none; background: #fff; }
    .CodeMirror { height: 100%; font-size: 14px; background: #0a0a0a; }
    .CodeMirror-gutters { background: #0a0a0a; border-right: 1px solid #222; }
    .action-buttons { display: none; }
    .action-buttons.visible { display: flex; }
    @media (max-width: 640px) {
      .modal-content { height: 100vh; border-radius: 0; }
      .modal-preview { height: 35%; }
    }
  </style>
</head>
<body class="text-white">

<div class="fixed inset-0 pointer-events-none z-10 px-5 md:px-7 flex justify-evenly">
  <div class="v-l"></div><div class="v-l"></div><div class="v-l"></div><div class="v-l"></div><div class="v-l"></div><div class="v-l"></div><div class="v-l"></div><div class="v-l"></div><div class="v-l"></div>
</div>

<div class="relative z-20 max-w-7xl mx-auto px-5 md:px-7 py-4 md:py-5 min-h-screen flex flex-col">
  
  <header class="pb-4 border-b border-white">
    <div class="flex flex-row justify-between items-center gap-4">
      <div class="flex flex-col gap-0.5">
        <div class="text-xl md:text-[26px] font-semibold tracking-tight">PIReactive Tech co.</div>
        <a href="https://mkbertrand.vercel.app" target="_blank" rel="noopener noreferrer" class="text-xs md:text-sm font-normal text-gray-400 hover:text-white transition w-fit">Hey am MKB! The creator</a>
      </div>
      <button id="m-b" class="block md:hidden p-2" aria-label="Menu"><iconify-icon icon="mdi:menu" class="text-2xl"></iconify-icon></button>
      <nav class="hidden md:flex gap-7 md:gap-11 pt-1.5 flex-wrap">
        <a href="home.html" class="text-[15px] font-normal hover:opacity-65 transition">HOME</a>
        <a href="works.html" class="text-[15px] font-normal hover:opacity-65 transition">WORKS</a>
        <a href="hosting.html" class="text-[15px] font-normal hover:opacity-65 transition">HOSTING</a>
        <a href="domain.html" class="text-[15px] font-normal hover:opacity-65 transition">DOMAIN</a>
        <a href="news.html" class="text-[15px] font-normal hover:opacity-65 transition">NEWS</a>
        <a href="about.html" class="text-[15px] font-normal hover:opacity-65 transition">ABOUT</a>
      </nav>
    </div>
    <div id="m-m" class="h md:hidden fixed inset-0 bg-black/95 backdrop-blur-lg z-50 pt-20 px-6">
      <button id="c-b" class="absolute top-5 right-5 p-2" aria-label="Close"><iconify-icon icon="mdi:close" class="text-2xl"></iconify-icon></button>
      <nav class="flex flex-col gap-6 text-2xl font-light">
        <a href="home.html" class="hover:text-gray-300 transition py-2 border-b border-white/10">HOME</a>
        <a href="works.html" class="hover:text-gray-300 transition py-2 border-b border-white/10">WORKS</a>
        <a href="hosting.html" class="hover:text-gray-300 transition py-2 border-b border-white/10">HOSTING</a>
        <a href="domain.html" class="hover:text-gray-300 transition py-2 border-b border-white/10">DOMAIN</a>
        <a href="news.html" class="hover:text-gray-300 transition py-2 border-b border-white/10">NEWS</a>
        <a href="about.html" class="hover:text-gray-300 transition py-2 border-b border-white/10">ABOUT</a>
      </nav>
    </div>
  </header>

  <div class="mt-8 mb-8">
    <div class="relative max-w-md">
      <iconify-icon icon="mdi:search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></iconify-icon>
      <input type="text" id="searchInput" placeholder="Search snippets..." class="w-full bg-transparent border border-gray-700 rounded-full py-3 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none focus:border-white transition">
    </div>
  </div>

  <div id="sectionsContainer" class="flex-1"></div>

  <footer class="border-t border-gray-800 pt-10 md:pt-12 pb-6 md:pb-8 mt-12">
    <div class="flex flex-col md:flex-row justify-between items-center gap-5 md:gap-6"><div class="flex items-center gap-3"><img src="images/logo.png" alt="Logo" class="h-8 md:h-10 w-auto invert" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"><span class="hidden text-xl md:text-2xl font-bold">PIReactive</span></div><div class="flex gap-5 md:gap-6"><a href="#" class="text-gray-400 hover:text-white transition text-xl"><iconify-icon icon="mdi:twitter"></iconify-icon></a><a href="#" class="text-gray-400 hover:text-white transition text-xl"><iconify-icon icon="mdi:linkedin"></iconify-icon></a><a href="#" class="text-gray-400 hover:text-white transition text-xl"><iconify-icon icon="mdi:github"></iconify-icon></a></div></div>
    <div class="text-center text-xs text-gray-500 mt-6">© 2026 PIReactive Tech co. All rights reserved.</div>
  </footer>
</div>

<div class="modal-overlay" id="snippetModal">
  <div class="modal-content">
    <div class="flex justify-between items-center p-5">
      <h3 id="modalTitle" class="text-lg font-medium"></h3>
      <button id="modalClose" class="text-white text-2xl hover:text-gray-400 transition">&times;</button>
    </div>
    <div class="flex gap-8 px-5 border-b border-gray-800">
      <button id="tab-preview" class="text-base font-medium pb-2 tab-u text-white transition">PREVIEW</button>
      <button id="tab-code" class="text-base font-medium pb-2 text-gray-500 hover:text-gray-300 transition">CODE</button>
    </div>
    <div id="modalPreviewContainer" class="modal-preview"><iframe id="modalPreviewFrame" sandbox="allow-scripts allow-same-origin"></iframe></div>
    <div id="modalEditorContainer" class="flex-1 overflow-hidden hidden"></div>
    <div class="flex gap-3 p-4 border-t border-gray-800 action-buttons" id="actionButtons">
      <button id="copyCodeBtn" class="bg-white text-black px-5 py-2 text-sm font-medium hover:bg-gray-200 transition flex items-center gap-2"><iconify-icon icon="mdi:content-copy"></iconify-icon>Copy</button>
      <button id="editCodeBtn" class="bg-transparent border border-gray-700 text-white px-5 py-2 text-sm font-medium hover:bg-white/10 transition flex items-center gap-2"><iconify-icon icon="mdi:pencil"></iconify-icon>Edit</button>
      <button id="downloadCodeBtn" class="bg-transparent border border-gray-700 text-white px-5 py-2 text-sm font-medium hover:bg-white/10 transition flex items-center gap-2"><iconify-icon icon="mdi:download"></iconify-icon>Download</button>
      <button id="resetCodeBtn" class="bg-transparent border border-gray-700 text-white px-5 py-2 text-sm font-medium hover:bg-white/10 hidden items-center gap-2"><iconify-icon icon="mdi:undo"></iconify-icon>Reset</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyAtHa9wAryji3EdWwhxT7tUwZquRD-LJvI",
    authDomain: "project-k-dbaef.firebaseapp.com",
    projectId: "project-k-dbaef",
    storageBucket: "project-k-dbaef.firebasestorage.app",
    messagingSenderId: "356936578912",
    appId: "1:356936578912:web:056bdbf8625b33d79e1005"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const snippetsCol = collection(db, "snippets");
  
  let allSnippets = [], searchTimeout, currentEditor = null, originalCode = '', isEditing = false;
  
  const modal = document.getElementById('snippetModal'), modalTitle = document.getElementById('modalTitle'), modalPreviewFrame = document.getElementById('modalPreviewFrame'), modalPreviewContainer = document.getElementById('modalPreviewContainer'), modalEditorContainer = document.getElementById('modalEditorContainer'), copyBtn = document.getElementById('copyCodeBtn'), editBtn = document.getElementById('editCodeBtn'), downloadBtn = document.getElementById('downloadCodeBtn'), resetBtn = document.getElementById('resetCodeBtn'), modalClose = document.getElementById('modalClose'), tabPreview = document.getElementById('tab-preview'), tabCode = document.getElementById('tab-code'), actionButtons = document.getElementById('actionButtons');
  
  const mB = document.getElementById('m-b'), mM = document.getElementById('m-m'), cB = document.getElementById('c-b');
  if(mB&&mM){mB.addEventListener('click',()=>{mM.classList.remove('h');document.body.style.overflow='hidden';});}
  if(cB&&mM){cB.addEventListener('click',()=>{mM.classList.add('h');document.body.style.overflow='';});}
  mM?.querySelectorAll('a').forEach(l=>l.addEventListener('click',()=>{mM.classList.add('h');document.body.style.overflow='';}));
  
  const borderColors = ['border-white', 'border-green', 'border-orange', 'border-sky', 'border-purple'];
  
  function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
  
  function createCard(s, idx){
    const d=document.createElement('div');d.className=`snippet-card group ${borderColors[idx % borderColors.length]}`;
    d.innerHTML=`<div class="snippet-preview-mini"><iframe sandbox="allow-scripts allow-same-origin" srcdoc="${s.code.replace(/"/g,'&quot;')}" loading="lazy"></iframe></div><div class="p-3 bg-transparent"><p class="text-sm font-medium text-gray-200">${s.name}</p></div>`;
    d.addEventListener('click',()=>openModal(s));return d;
  }
  
  function renderSections(snippets){
    const c=document.getElementById('sectionsContainer');
    if(!snippets.length){c.innerHTML='<div class="text-center py-20 text-gray-400">No snippets found</div>';return;}
    const sh=shuffle([...snippets]);
    const news=sh.slice(0,4), popular=shuffle([...sh]).slice(0,4), all=shuffle([...sh]);
    c.innerHTML=`
      <div class="mb-8"><div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="newsGrid"></div></div>
      <div class="mb-8"><div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="popularGrid"></div></div>
      <div class="mb-8"><div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="allGrid"></div></div>
    `;
    const nG=document.getElementById('newsGrid');news.forEach((s,i)=>nG.appendChild(createCard(s,i)));
    const pG=document.getElementById('popularGrid');popular.forEach((s,i)=>pG.appendChild(createCard(s,i+4)));
    const aG=document.getElementById('allGrid');all.forEach((s,i)=>aG.appendChild(createCard(s,i+8)));
  }
  
  async function loadSnippets(){
    try{const q=query(snippetsCol,orderBy("createdAt","desc"));const snap=await getDocs(q);allSnippets=snap.docs.map(d=>({id:d.id,...d.data()}));renderSections(allSnippets);}
    catch(e){document.getElementById('sectionsContainer').innerHTML='<div class="text-center py-20 text-red-400">Failed to load snippets</div>';}
  }
  
  document.getElementById('searchInput').addEventListener('input',e=>{
    clearTimeout(searchTimeout);searchTimeout=setTimeout(()=>{const t=e.target.value.toLowerCase();renderSections(t?allSnippets.filter(s=>s.name.toLowerCase().includes(t)||(s.code||'').toLowerCase().includes(t)):allSnippets);},300);
  });
  
  function switchTab(tab){
    if(tab==='preview'){
      tabPreview.classList.add('tab-u','text-white');tabPreview.classList.remove('text-gray-500');
      tabCode.classList.remove('tab-u','text-white');tabCode.classList.add('text-gray-500');
      modalPreviewContainer.classList.remove('hidden');modalEditorContainer.classList.add('hidden');
      actionButtons.classList.remove('visible');
    }else{
      tabCode.classList.add('tab-u','text-white');tabCode.classList.remove('text-gray-500');
      tabPreview.classList.remove('tab-u','text-white');tabPreview.classList.add('text-gray-500');
      modalPreviewContainer.classList.add('hidden');modalEditorContainer.classList.remove('hidden');
      actionButtons.classList.add('visible');
      if(currentEditor)currentEditor.refresh();
    }
  }
  
  tabPreview.addEventListener('click',()=>switchTab('preview'));
  tabCode.addEventListener('click',()=>switchTab('code'));
  
  function openModal(s){
    modalTitle.textContent=s.name;originalCode=s.code||'';modalPreviewFrame.srcdoc=originalCode;
    if(currentEditor){currentEditor.toTextArea();currentEditor=null;}
    modalEditorContainer.innerHTML='<textarea id="modalCodeArea"></textarea>';
    const ta=document.getElementById('modalCodeArea');ta.value=originalCode;ta.readOnly=true;
    currentEditor=CodeMirror.fromTextArea(ta,{mode:"htmlmixed",theme:"dracula",lineNumbers:true,readOnly:true,autoCloseBrackets:true,matchBrackets:true});
    isEditing=false;editBtn.innerHTML='<iconify-icon icon="mdi:pencil"></iconify-icon>Edit';resetBtn.style.display='none';
    switchTab('preview');modal.classList.add('active');document.body.style.overflow='hidden';
  }
  
  function closeModal(){modal.classList.remove('active');document.body.style.overflow='';if(currentEditor){currentEditor.toTextArea();currentEditor=null;}}
  function updatePreview(){if(currentEditor)modalPreviewFrame.srcdoc=currentEditor.getValue();}
  
  modalClose.addEventListener('click',closeModal);modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
  
  editBtn.addEventListener('click',()=>{if(!currentEditor)return;
    if(!isEditing){currentEditor.setOption('readOnly',false);editBtn.innerHTML='<iconify-icon icon="mdi:check"></iconify-icon>Done';resetBtn.style.display='flex';isEditing=true;currentEditor.on('change',updatePreview);}
    else{currentEditor.setOption('readOnly',true);editBtn.innerHTML='<iconify-icon icon="mdi:pencil"></iconify-icon>Edit';resetBtn.style.display='none';isEditing=false;currentEditor.off('change',updatePreview);}
  });
  
  resetBtn.addEventListener('click',()=>{if(currentEditor){currentEditor.setValue(originalCode);updatePreview();}});
  copyBtn.addEventListener('click',async()=>{const code=currentEditor?currentEditor.getValue():originalCode;try{await navigator.clipboard.writeText(code);copyBtn.innerHTML='<iconify-icon icon="mdi:check"></iconify-icon>Copied!';setTimeout(()=>copyBtn.innerHTML='<iconify-icon icon="mdi:content-copy"></iconify-icon>Copy',2000);}catch(e){}});
  downloadBtn.addEventListener('click',()=>{const code=currentEditor?currentEditor.getValue():originalCode;const blob=new Blob([code],{type:'text/html'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='pireactive.html';a.click();URL.revokeObjectURL(url);});
  document.addEventListener('keydown',e=>{if(e.key==='Escape'&&modal.classList.contains('active'))closeModal();});
  
  loadSnippets();
</script>
</body>
</html>
