<script type="module">

  import { getFirestore, collection, getDocs, query, orderBy, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyAtHa9wAryji3EdWwhxT7tUwZquRD-LJvI",
    authDomain: "project-k-dbaef.firebaseapp.com",
    projectId: "project-k-dbaef",

    messagingSenderId: "356936578912",
    appId: "1:356936578912:web:056bdbf8625b33d79e1005"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const snippetsCol = collection(db, "snippets");
  
  let allSnippets = [], searchTimeout, currentEditor = null, originalCode = '', isEditing = false, currentSnippetId = null, currentSnippet = null;
  let currentAllPage = 1;
  const ITEMS_PER_PAGE = 18;
  
  const modal = document.getElementById('snippetModal'), modalTitle = document.getElementById('modalTitle'), modalPreviewFrame = document.getElementById('modalPreviewFrame'), modalPreviewContainer = document.getElementById('modalPreviewContainer'), modalEditorContainer = document.getElementById('modalEditorContainer'), copyBtn = document.getElementById('copyCodeBtn'), shareBtn = document.getElementById('shareCodeBtn'), editBtn = document.getElementById('editCodeBtn'), downloadBtn = document.getElementById('downloadCodeBtn'), resetBtn = document.getElementById('resetCodeBtn'), modalClose = document.getElementById('modalClose'), tabPreview = document.getElementById('tab-preview'), tabCode = document.getElementById('tab-code'), actionButtons = document.getElementById('actionButtons');
  
  const mB = document.getElementById('m-b'), mM = document.getElementById('m-m'), cB = document.getElementById('c-b');
  if(mB&&mM){mB.addEventListener('click',()=>{mM.classList.remove('h');document.body.style.overflow='hidden';});}
  if(cB&&mM){cB.addEventListener('click',()=>{mM.classList.add('h');document.body.style.overflow='';});}
  mM?.querySelectorAll('a').forEach(l=>l.addEventListener('click',()=>{mM.classList.add('h');document.body.style.overflow='';}));
  
  const borderColors = ['border-white', 'border-green', 'border-orange', 'border-sky', 'border-purple'];
  
  function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
  
  function createCard(s, idx){
    const d=document.createElement('div');d.className=`snippet-card group ${borderColors[idx % borderColors.length]}`;
    d.innerHTML=`<div class="snippet-preview-mini"><iframe sandbox="allow-scripts allow-same-origin" srcdoc="${s.code.replace(/"/g,'&quot;')}" loading="lazy" title="${s.name} preview"></iframe></div><div class="p-3 bg-transparent"><p class="text-sm font-medium text-gray-200">${s.name}</p></div>`;
    d.addEventListener('click',()=>openModal(s));return d;
  }
  
  async function incrementViewCount(snippetId) {
    try {
      const snippetRef = doc(db, "snippets", snippetId);
      await updateDoc(snippetRef, { views: increment(1) });
    } catch(e) {
      console.error("Error updating view count:", e);
    }
  }
  
  function generateScreenshot(snippet) {
    return new Promise((resolve) => {
      const canvas = document.getElementById('screenshotCanvas');
      const ctx = canvas.getContext('2d');
      
      canvas.width = 1200;
      canvas.height = 630;
      
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, 1200, 630);
      
      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(40, 40, 1120, 550);
      
      ctx.font = 'bold 32px Poppins, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.fillText(snippet.name, 600, 120);
      
      ctx.font = '24px Poppins, sans-serif';
      ctx.fillStyle = '#22c55e';
      ctx.fillText('PIReactive Tech co.', 600, 180);
      
      ctx.font = '18px Poppins, sans-serif';
      ctx.fillStyle = '#999999';
      ctx.fillText('Free Production-Ready Code Snippet', 600, 240);
      
      ctx.strokeStyle = '#333333';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(100, 300);
      ctx.lineTo(1100, 300);
      ctx.stroke();
      
      ctx.font = '16px monospace';
      ctx.fillStyle = '#666666';
      ctx.textAlign = 'left';
      
      const lines = (snippet.code || '').split('\n').slice(0, 8);
      lines.forEach((line, i) => {
        if (i < 7) {
          ctx.fillText(line.substring(0, 60) + (line.length > 60 ? '...' : ''), 100, 350 + i * 30);
        }
      });
      
      ctx.font = '14px Poppins, sans-serif';
      ctx.fillStyle = '#666666';
      ctx.textAlign = 'center';
      ctx.fillText('pireactive.vercel.app', 600, 580);
      
      resolve(canvas.toDataURL('image/png'));
    });
  }
  
  async function updateMetaTags(snippet) {
    const title = `${snippet.name} | PIReactive Code Snippets`;
    const description = `Free production-ready ${snippet.name} code snippet. Copy, edit, and download this component crafted by PIReactive Tech co.`;
    const url = `${window.location.origin}${window.location.pathname}?snippet=${snippet.id}`;
    
    document.title = title;
    
    const screenshotDataUrl = await generateScreenshot(snippet);
    
    const metaTags = {
      'title': title,
      'description': description,
      'og:title': title,
      'og:description': description,
      'og:url': url,
      'og:image': screenshotDataUrl,
      'twitter:title': title,
      'twitter:description': description,
      'twitter:url': url,
      'twitter:image': screenshotDataUrl
    };
    
    Object.entries(metaTags).forEach(([name, content]) => {
      let meta;
      if (name === 'title') {
        meta = document.querySelector('meta[name="title"]');
      } else if (name === 'description') {
        meta = document.querySelector('meta[name="description"]');
      } else if (name.startsWith('og:')) {
        meta = document.querySelector(`meta[property="${name}"]`);
      } else if (name.startsWith('twitter:')) {
        meta = document.querySelector(`meta[name="${name}"]`);
      }
      
      if (meta) {
        meta.setAttribute('content', content);
      }
    });
    
    const canonical = document.querySelector('link[rel="canonical"]');
    if (canonical) canonical.setAttribute('href', url);
  }
  
  function resetMetaTags() {
    const defaultTitle = 'PIReactive | Free Production-Ready Code Snippets';
    const defaultDescription = 'Discover free, production-ready HTML, CSS, and JavaScript code snippets. Copy, edit, and download components crafted by PIReactive Tech co.';
    const defaultUrl = `${window.location.origin}${window.location.pathname}`;
    const defaultImage = 'https://pireactive.vercel.app/og-image.jpg';
    
    document.title = defaultTitle;
    
    const metaTags = {
      'title': defaultTitle,
      'description': defaultDescription,
      'og:title': defaultTitle,
      'og:description': defaultDescription,
      'og:url': defaultUrl,
      'og:image': defaultImage,
      'twitter:title': defaultTitle,
      'twitter:description': defaultDescription,
      'twitter:url': defaultUrl,
      'twitter:image': defaultImage
    };
    
    Object.entries(metaTags).forEach(([name, content]) => {
      let meta;
      if (name === 'title') {
        meta = document.querySelector('meta[name="title"]');
      } else if (name === 'description') {
        meta = document.querySelector('meta[name="description"]');
      } else if (name.startsWith('og:')) {
        meta = document.querySelector(`meta[property="${name}"]`);
      } else if (name.startsWith('twitter:')) {
        meta = document.querySelector(`meta[name="${name}"]`);
      }
      
      if (meta) {
        meta.setAttribute('content', content);
      }
    });
    
    const canonical = document.querySelector('link[rel="canonical"]');
    if (canonical) canonical.setAttribute('href', defaultUrl);
  }
  
  function updateAllGrid(snippets, page) {
    const allGrid = document.getElementById('allGrid');
    if (!allGrid) return;
    
    const startIndex = (page - 1) * ITEMS_PER_PAGE;
    const endIndex = startIndex + ITEMS_PER_PAGE;
    const pageSnippets = snippets.slice(startIndex, endIndex);
    
    allGrid.innerHTML = '';
    pageSnippets.forEach((s, i) => allGrid.appendChild(createCard(s, startIndex + i)));
    
    const totalPages = Math.ceil(snippets.length / ITEMS_PER_PAGE);
    const pageIndicator = document.getElementById('pageIndicator');
    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');
    
    if (pageIndicator) {
      pageIndicator.textContent = `Page ${page} of ${totalPages}`;
    }
    if (prevBtn) {
      prevBtn.disabled = page === 1;
    }
    if (nextBtn) {
      nextBtn.disabled = page === totalPages;
    }
  }
  
  function renderSections(snippets){
    const c=document.getElementById('sectionsContainer');
    if(!snippets.length){c.innerHTML='<div class="text-center py-20 text-gray-400">No snippets found</div>';return;}
    
    const newest = snippets.slice(0, 6);
    
    const popular = [...snippets].sort((a, b) => {
      const viewsA = a.views || 0;
      const viewsB = b.views || 0;
      if (viewsA === viewsB) return 0;
      return viewsB - viewsA;
    }).slice(0, 9);
    
    const allShuffled = shuffle([...snippets]);
    const totalPages = Math.ceil(allShuffled.length / ITEMS_PER_PAGE);
    currentAllPage = 1;
    
    c.innerHTML=`
      <section class="mb-8" aria-labelledby="newest-heading">
        <h2 id="newest-heading" class="text-xl font-semibold mb-4">Newest Snippets</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="newsGrid"></div>
      </section>
      <section class="mb-8" aria-labelledby="popular-heading">
        <h2 id="popular-heading" class="text-xl font-semibold mb-4">Popular Snippets</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="popularGrid"></div>
      </section>
      <section class="mb-8" aria-labelledby="all-heading">
        <div class="flex justify-between items-center mb-4">
          <h2 id="all-heading" class="text-xl font-semibold">All Snippets</h2>
          <nav class="flex items-center gap-2" aria-label="Pagination">
            <button id="prevPageBtn" class="pagination-btn" disabled aria-label="Previous page">
              <iconify-icon icon="mdi:chevron-left" aria-hidden="true"></iconify-icon> Prev
            </button>
            <span id="pageIndicator" class="page-indicator" aria-live="polite">Page 1 of ${totalPages}</span>
            <button id="nextPageBtn" class="pagination-btn" ${totalPages <= 1 ? 'disabled' : ''} aria-label="Next page">
              Next <iconify-icon icon="mdi:chevron-right" aria-hidden="true"></iconify-icon>
            </button>
          </nav>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="allGrid"></div>
      </section>
    `;
    
    const nG=document.getElementById('newsGrid');newest.forEach((s,i)=>nG.appendChild(createCard(s,i)));
    const pG=document.getElementById('popularGrid');popular.forEach((s,i)=>pG.appendChild(createCard(s,i+6)));
    
    updateAllGrid(allShuffled, 1);
    
    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');
    
    if (prevBtn) {
      prevBtn.addEventListener('click', () => {
        if (currentAllPage > 1) {
          currentAllPage--;
          updateAllGrid(allShuffled, currentAllPage);
          window.scrollTo({ top: document.getElementById('allGrid').offsetTop - 100, behavior: 'smooth' });
        }
      });
    }
    
    if (nextBtn) {
      nextBtn.addEventListener('click', () => {
        if (currentAllPage < totalPages) {
          currentAllPage++;
          updateAllGrid(allShuffled, currentAllPage);
          window.scrollTo({ top: document.getElementById('allGrid').offsetTop - 100, behavior: 'smooth' });
        }
      });
    }
  }
  
  async function loadSnippets(){
    try{const q=query(snippetsCol,orderBy("createdAt","desc"));const snap=await getDocs(q);allSnippets=snap.docs.map(d=>({id:d.id,...d.data()}));renderSections(allSnippets);
    
    const urlParams = new URLSearchParams(window.location.search);
    const snippetId = urlParams.get('snippet');
    if (snippetId) {
      const snippet = allSnippets.find(s => s.id === snippetId);
      if (snippet) {
        setTimeout(() => openModal(snippet), 500);
      }
    }}
    catch(e){document.getElementById('sectionsContainer').innerHTML='<div class="text-center py-20 text-red-400">Failed to load snippets</div>';}
  }
  
  document.getElementById('searchInput').addEventListener('input',e=>{
    clearTimeout(searchTimeout);searchTimeout=setTimeout(()=>{const t=e.target.value.toLowerCase();renderSections(t?allSnippets.filter(s=>s.name.toLowerCase().includes(t)||(s.code||'').toLowerCase().includes(t)):allSnippets);},300);
  });
  
  function switchTab(tab){
    if(tab==='preview'){
      tabPreview.classList.add('tab-u','text-white');tabPreview.classList.remove('text-gray-500');
      tabCode.classList.remove('tab-u','text-white');tabCode.classList.add('text-gray-500');
      tabPreview.setAttribute('aria-selected', 'true');
      tabCode.setAttribute('aria-selected', 'false');
      modalPreviewContainer.classList.remove('hidden');modalEditorContainer.classList.add('hidden');
      actionButtons.classList.remove('visible');
    }else{
      tabCode.classList.add('tab-u','text-white');tabCode.classList.remove('text-gray-500');
      tabPreview.classList.remove('tab-u','text-white');tabPreview.classList.add('text-gray-500');
      tabCode.setAttribute('aria-selected', 'true');
      tabPreview.setAttribute('aria-selected', 'false');
      modalPreviewContainer.classList.add('hidden');modalEditorContainer.classList.remove('hidden');
      actionButtons.classList.add('visible');
      if(currentEditor)currentEditor.refresh();
    }
  }
  
  tabPreview.addEventListener('click',()=>switchTab('preview'));
  tabCode.addEventListener('click',()=>switchTab('code'));
  
  async function openModal(s){
    currentSnippet = s;
    modalTitle.textContent=s.name;originalCode=s.code||'';currentSnippetId=s.id;modalPreviewFrame.srcdoc=originalCode;
    
    await incrementViewCount(s.id);
    await updateMetaTags(s);
    
    if(currentEditor){currentEditor.toTextArea();currentEditor=null;}
    modalEditorContainer.innerHTML='<textarea id="modalCodeArea" aria-label="Code editor"></textarea>';
    const ta=document.getElementById('modalCodeArea');ta.value=originalCode;ta.readOnly=true;
    currentEditor=CodeMirror.fromTextArea(ta,{mode:"htmlmixed",theme:"dracula",lineNumbers:true,readOnly:true,autoCloseBrackets:true,matchBrackets:true});
    isEditing=false;editBtn.innerHTML='<iconify-icon icon="mdi:pencil" aria-hidden="true"></iconify-icon>Edit';resetBtn.style.display='none';
    switchTab('preview');modal.classList.add('active');document.body.style.overflow='hidden';
    
    const url = `${window.location.origin}${window.location.pathname}?snippet=${s.id}`;
    window.history.pushState({snippetId: s.id}, '', url);
  }
  
  function closeModal(){
    modal.classList.remove('active');document.body.style.overflow='';
    if(currentEditor){currentEditor.toTextArea();currentEditor=null;}
    resetMetaTags();
    const url = `${window.location.origin}${window.location.pathname}`;
    window.history.pushState({}, '', url);
  }
  
  function updatePreview(){if(currentEditor)modalPreviewFrame.srcdoc=currentEditor.getValue();}
  
  modalClose.addEventListener('click',closeModal);
  modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
  
  editBtn.addEventListener('click',()=>{if(!currentEditor)return;
    if(!isEditing){
      currentEditor.setOption('readOnly',false);
      editBtn.innerHTML='<iconify-icon icon="mdi:check" aria-hidden="true"></iconify-icon>Done';
      resetBtn.style.display='flex';
      isEditing=true;
      currentEditor.on('change',updatePreview);
      switchTab('code');
    }
    else{
      currentEditor.setOption('readOnly',true);
      editBtn.innerHTML='<iconify-icon icon="mdi:pencil" aria-hidden="true"></iconify-icon>Edit';
      resetBtn.style.display='none';
      isEditing=false;
      currentEditor.off('change',updatePreview);
    }
  });
  
  resetBtn.addEventListener('click',()=>{if(currentEditor){currentEditor.setValue(originalCode);updatePreview();}});
  
  copyBtn.addEventListener('click',async()=>{const code=currentEditor?currentEditor.getValue():originalCode;try{await navigator.clipboard.writeText(code);copyBtn.innerHTML='<iconify-icon icon="mdi:check" aria-hidden="true"></iconify-icon>Copied!';setTimeout(()=>copyBtn.innerHTML='<iconify-icon icon="mdi:content-copy" aria-hidden="true"></iconify-icon>Copy',2000);}catch(e){}});
  
  shareBtn.addEventListener('click',async()=>{
    const url=`${window.location.origin}${window.location.pathname}?snippet=${currentSnippetId}`;
    const shareData = {
      title: `${currentSnippet.name} | PIReactive Code Snippets`,
      text: `Check out this free ${currentSnippet.name} code snippet from PIReactive Tech co.`,
      url: url
    };
    
    try {
      if (navigator.share) {
        await navigator.share(shareData);
      } else {
        await navigator.clipboard.writeText(url);
        shareBtn.innerHTML='<iconify-icon icon="mdi:check" aria-hidden="true"></iconify-icon>Copied!';
        setTimeout(()=>shareBtn.innerHTML='<iconify-icon icon="mdi:share-variant" aria-hidden="true"></iconify-icon>Share',2000);
      }
    } catch(e) {
      try {
        await navigator.clipboard.writeText(url);
        shareBtn.innerHTML='<iconify-icon icon="mdi:check" aria-hidden="true"></iconify-icon>Copied!';
        setTimeout(()=>shareBtn.innerHTML='<iconify-icon icon="mdi:share-variant" aria-hidden="true"></iconify-icon>Share',2000);
      } catch(err) {
        console.error('Share failed:', err);
      }
    }
  });
  
  downloadBtn.addEventListener('click',()=>{const code=currentEditor?currentEditor.getValue():originalCode;const blob=new Blob([code],{type:'text/html'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`${currentSnippet.name.toLowerCase().replace(/\s+/g, '-')}.html`;a.click();URL.revokeObjectURL(url);});
  
  document.addEventListener('keydown',e=>{if(e.key==='Escape'&&modal.classList.contains('active'))closeModal();});
  
  window.addEventListener('popstate', (e) => {
    const urlParams = new URLSearchParams(window.location.search);
    const snippetId = urlParams.get('snippet');
    if (snippetId) {
      const snippet = allSnippets.find(s => s.id === snippetId);
      if (snippet && !modal.classList.contains('active')) {
        openModal(snippet);
      }
    } else {
      if (modal.classList.contains('active')) {
        closeModal();
      }
    }
  });
  
  loadSnippets();
</script>
</body>
</html>
