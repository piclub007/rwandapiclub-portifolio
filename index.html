*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f8fafc;min-height:100vh;overflow-x:hidden;position:relative;}
.grain-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;opacity:0.12;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:180px;mix-blend-mode:multiply;}
.hero-glow{position:fixed;top:0;left:0;width:100%;height:100%;overflow:hidden;z-index:0;pointer-events:none;}
.blob-1,.blob-2,.blob-3,.blob-4{position:absolute;filter:blur(100px);opacity:0.25;border-radius:50%;animation:floatBlob 22s infinite alternate ease-in-out;}
.blob-1{width:45vw;height:45vw;background:radial-gradient(circle,#f472b6,#a855f7);top:-15%;left:-10%;animation-duration:25s;}
.blob-2{width:50vw;height:50vw;background:radial-gradient(circle,#60a5fa,#06b6d4);bottom:-20%;right:-15%;animation-duration:30s;animation-delay:-3s;}
.blob-3{width:35vw;height:35vw;background:radial-gradient(circle,#fbbf24,#f97316);top:40%;left:60%;animation-duration:28s;animation-delay:-5s;opacity:0.2;}
.blob-4{width:40vw;height:40vw;background:radial-gradient(circle,#34d399,#14b8a6);top:60%;left:-10%;animation-duration:35s;animation-delay:-8s;opacity:0.2;}
@keyframes floatBlob{0%{transform:translate(0,0) scale(1);}100%{transform:translate(60px,50px) scale(1.2);}}
.nav-link{position:relative;transition:all 0.3s;font-weight:500;}
.nav-link::after{content:'';position:absolute;bottom:-6px;left:50%;width:0;height:2.5px;background:linear-gradient(90deg,#a855f7,#3b82f6);transition:all 0.3s;transform:translateX(-50%);border-radius:2px;}
.nav-link:hover::after{width:70%;}
.nav-link.active{color:#a855f7;background:transparent;}
.nav-link.active::after{width:70%;}
.page-transition{animation:fadeInPage 0.4s cubic-bezier(0.2,0.9,0.4,1.1) forwards;}
@keyframes fadeInPage{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.greeting-card{background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.5);box-shadow:0 20px 35px -12px rgba(0,0,0,0.08),0 0 0 0.5px rgba(255,255,255,0.6) inset;transition:all 0.4s;}
.greeting-card:hover{transform:translateY(-4px);box-shadow:0 25px 40px -15px rgba(0,0,0,0.12);}
.liquid-text{background:linear-gradient(135deg,#a855f7,#3b82f6,#06b6d4,#f472b6);background-size:300% 300%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:liquidWave 5s ease infinite;display:inline-block;}
@keyframes liquidWave{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.loader-circle{width:42px;height:42px;border:3px solid rgba(139,92,246,0.2);border-top-color:#a855f7;border-right-color:#3b82f6;border-radius:50%;animation:spinLoader 0.9s cubic-bezier(0.68,-0.55,0.265,1.55) infinite;box-shadow:0 0 10px rgba(168,85,247,0.3);}
@keyframes spinLoader{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.btn-primary{background:linear-gradient(135deg,#a855f7,#3b82f6);transition:all 0.3s;box-shadow:0 4px 14px rgba(139,92,246,0.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(139,92,246,0.4);}
.btn-outline-light{border:1.5px solid #e2e8f0;background:white;transition:all 0.3s;}
.btn-outline-light:hover{border-color:#a855f7;background:#faf5ff;transform:translateY(-2px);}
.card-glass{background:rgba(255,255,255,0.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.8);transition:all 0.3s;}
.card-glass:hover{transform:translateY(-6px);background:rgba(255,255,255,0.85);box-shadow:0 20px 30px -12px rgba(0,0,0,0.1);}
input,textarea{transition:all 0.3s;}
input:focus,textarea:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,0.1);outline:none;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:#f1f5f9;border-radius:10px;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:#a855f7;}
</style>
</head>

let currentPage = 'home';

function updateDateTime() {
let now=new Date();let hours=now.getHours();let mins=now.getMinutes().toString().padStart(2,'0');let secs=now.getSeconds().toString().padStart(2,'0');let day=now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});let timeStr=\`\${hours.toString().padStart(2,'0')}:\${mins}:\${secs}\`;let dateElem=document.getElementById('currentDate');let timeElem=document.getElementById('currentTime');let greetElem=document.getElementById('greetingMsg');if(dateElem)dateElem.innerText=day;if(timeElem)timeElem.innerText=timeStr;if(greetElem){let msg='';let icon='';if(hours<12){msg='🌅 GOOD MORNING';}else if(hours<18){msg='☀️ GOOD AFTERNOON';}else{msg='🌙 GOOD EVENING';}greetElem.innerText=msg;}}
function startTimeUpdate(){updateDateTime();setInterval(updateDateTime,1000);}
window.navigateTo=function(page){if(pages[page]){currentPage=page;document.getElementById('app').innerHTML=pages[page];document.getElementById('app').classList.add('page-transition');setTimeout(()=>{document.getElementById('app').classList.remove('page-transition');},400);document.querySelectorAll('.nav-link').forEach(link=>{link.classList.remove('active');if(link.getAttribute('onclick')?.includes(`'${page}'`)){link.classList.add('active');}});if(page==='home'){startTimeUpdate();}window.scrollTo({top:0,behavior:'smooth'});}};
document.getElementById('app').innerHTML=pages.home;startTimeUpdate();document.querySelectorAll('.nav-link').forEach(link=>{if(link.getAttribute('onclick')?.includes("'home'")){link.classList.add('active');}});
</script>
