<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pireactive</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="js/firebase-config.js" type="module"></script>
<style>
*{font-family:'Inter',sans-serif;border-radius:20px!important;}
body{background:#f5f7fb;}
button,.btn{border-radius:40px!important;transition:all .2s;}
button:hover{transform:translateY(-2px);filter:brightness(.96);}
.sidebar-item{transition:all .2s;margin:4px 0;display:flex;align-items:center;gap:12px;padding:12px 20px;text-decoration:none!important;color:#334155;font-weight:500;}
.sidebar-item:hover{background:#f1f5f9;transform:translateX(6px);}
.nav-active{background:#000;color:#fff!important;}
input,textarea,select{border:1px solid #e2e8f0;background:#fff;padding:12px 16px;outline:none;font-size:14px;width:100%;}
input:focus,textarea:focus,select:focus{border-color:#000;box-shadow:0 0 0 3px rgba(0,0,0,.05);}
.stat-card{background:#fff;padding:24px;border:1px solid #eef2ff;transition:all .2s;}
.stat-card:hover{transform:translateY(-4px);box-shadow:0 20px 25px -12px rgba(0,0,0,.1);}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
(function(){
const _p0=window.location.pathname;
const _p1=_p0.substring(_p0.lastIndexOf('/')+1)||'home.html';
const _p2=_p1.replace('.html','');
const _pages={home:'home.html',domain:'domain.html',hosting:'hosting.html',clients:'clients.html',news:'news.html',about:'about.html',admin:'admin.html'};
const _load=async(p)=>{try{const r=await fetch(p);const h=await r.text();document.getElementById('app').innerHTML=h;history.pushState(null,'',p.replace('.html','.html'));window.dispatchEvent(new Event('pagechange'));}catch(e){console.error(e);}};
const _nav=(p)=>{if(_pages[p])_load(_pages[p]);};
window.navigateTo=_nav;
window.onpopstate=()=>{const _ph=window.location.pathname;const _pn=_ph.substring(_ph.lastIndexOf('/')+1)||'home.html';_load(_pn);};
_load(_p1);
})();
</script>
</body>
</html>
