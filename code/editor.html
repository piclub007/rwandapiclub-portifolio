<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NovaCore | Resizable Compiler + 3-Column Snippet Grid</title> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #0a0a0f;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0f0f1a, #030308);
    }

    /* Top bar */
    .top-bar {
      background: rgba(18, 18, 26, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(59, 130, 246, 0.3);
      padding: 12px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      z-index: 10;
    }

    .name-section {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 20px 4px 18px;
      border-radius: 60px;
      border: 1px solid rgba(59, 130, 246, 0.4);
    }

    .name-label {
      color: #94a3b8;
      font-weight: 500;
      font-size: 13px;
    }

    #snippetNameInput {
      background: transparent;
      border: none;
      padding: 9px 0;
      color: white;
      font-size: 14px;
      width: 240px;
      outline: none;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 8px 22px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(105deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 2px 8px rgba(59,130,246,0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(59,130,246,0.4); }

    .btn-outline {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(4px);
      border: 1px solid #3b82f6;
      color: #90cdf4;
    }
    .btn-outline:hover { background: #1e2a3a; }

    #allSnippetsBtn {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #60a5fa;
      color: #60a5fa;
    }

    /* RESIZABLE CONTAINER - FIXED STACKING ISSUE */
    .resizable-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    .editor-panel {
      width: 50%;
      display: flex;
      flex-direction: column;
      background: #0c0c12;
      overflow: hidden;
      min-width: 200px;
    }

    .preview-panel {
      width: 50%;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      overflow: hidden;
      min-width: 200px;
    }

    /* Resizer handle - no stacking bugs */
    .resize-handle {
      width: 6px;
      background: #2a2a35;
      cursor: col-resize;
      transition: background 0.15s;
      position: relative;
      flex-shrink: 0;
      z-index: 20;
    }
    .resize-handle:hover, .resize-handle.active {
      background: #3b82f6;
    }
    .resize-handle::after {
      content: '';
      position: absolute;
      top: 0;
      left: -4px;
      right: -4px;
      bottom: 0;
    }

    .panel-header {
      background: rgba(12, 12, 18, 0.95);
      padding: 12px 24px;
      font-size: 12px;
      font-weight: 600;
      color: #a0aec0;
      border-bottom: 1px solid #1f2937;
      backdrop-filter: blur(8px);
    }

    .CodeMirror {
      height: 100%;
      font-size: 14px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: #0c0c12;
    }

    .preview-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: white;
    }

    /* MODAL - 3 COLUMN GRID, INFINITE ROWS, SCROLLABLE */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.97);
      backdrop-filter: blur(16px);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.25s, opacity 0.25s;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-container {
      background: #0e0e16;
      width: 94%;
      max-width: 1500px;
      height: 90%;
      border-radius: 32px;
      border: 1px solid rgba(59, 130, 246, 0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.9);
    }

    .modal-header {
      padding: 20px 32px;
      border-bottom: 1px solid #22222e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .modal-header h2 {
      color: white;
      font-size: 22px;
      font-weight: 600;
      background: linear-gradient(135deg, #fff, #90cdf4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .modal-search {
      background: #1a1a24;
      border: 1px solid #334155;
      padding: 12px 24px;
      border-radius: 60px;
      width: 320px;
      color: white;
      outline: none;
      font-size: 14px;
    }
    .modal-search:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }

    .close-modal {
      background: #1f2937;
      border: none;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 44px;
      cursor: pointer;
      font-size: 24px;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-modal:hover { background: #3b82f6; transform: rotate(90deg); }

    /* GRID: EXACTLY 3 COLUMNS, INFINITE ROWS, SCROLL */
    .snippets-grid {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
      align-content: start;
    }

    /* Card styling with preview iframe on top + name */
    .snippet-card-modal {
      background: #0b0b12;
      border-radius: 24px;
      border: 1px solid #262630;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
    }

    .snippet-card-modal:hover {
      transform: translateY(-5px);
      border-color: #3b82f6;
      box-shadow: 0 18px 30px -12px rgba(59,130,246,0.4);
    }

    .card-preview-live {
      background: #ffffff;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      position: relative;
      border-bottom: 2px solid #1e293b;
    }

    .card-preview-live iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      pointer-events: none;
      transform: scale(0.7);
      transform-origin: 0 0;
      width: 143%;
      height: 143%;
    }

    .snippet-meta-modern {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0b0b12;
      gap: 10px;
    }

    .snippet-title {
      color: #e2e8f0;
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .edit-snippet-btn {
      background: linear-gradient(95deg, #1e293b, #0f172a);
      border: 1px solid #3b82f6;
      padding: 5px 14px;
      border-radius: 40px;
      color: #90caf9;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }
    .edit-snippet-btn:hover { background: #2563eb; color: white; }

    .empty-grid {
      color: #6b7280;
      text-align: center;
      padding: 60px;
      font-size: 16px;
      grid-column: 1 / -1;
    }

    /* Responsive: on smaller screens keep 3 columns but shrink gap */
    @media (max-width: 1000px) {
      .snippets-grid { gap: 18px; padding: 20px; }
    }
    @media (max-width: 750px) {
      .snippets-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 500px) {
      .snippets-grid { grid-template-columns: 1fr; }
    }

    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1e293b;
      backdrop-filter: blur(12px);
      color: #b9e6ff;
      padding: 12px 28px;
      border-radius: 48px;
      font-size: 13px;
      z-index: 1200;
      border-left: 4px solid #3b82f6;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(40px);}
      to { opacity: 1; transform: translateX(0);}
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f0f17; }
    ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 8px; }
  </style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="name-section">
      <span class="name-label"><span class="iconify" data-icon="mdi:label-outline"></span> SNIPPET NAME</span>
      <input type="text" id="snippetNameInput" placeholder="e.g., Glassmorphic Hero, 3D Card...">
    </div>
    <div class="action-buttons">
      <button id="runBtn" class="btn btn-primary"><span class="iconify" data-icon="mdi:play"></span> RUN</button>
      <button id="saveSnippetBtn" class="btn btn-outline"><span class="iconify" data-icon="mdi:content-save"></span> SAVE</button>
      <button id="allSnippetsBtn" class="btn"><span class="iconify" data-icon="mdi:code-braces-box"></span> ALL SNIPPETS</button>
    </div>
  </div>

  <!-- Resizable two-columns with fixed separator -->
  <div class="resizable-container" id="resizableContainer">
    <div class="editor-panel" id="editorPanel">
      <div class="panel-header"><span class="iconify" data-icon="mdi:code-tags"></span> CODE EDITOR (HTML/CSS/JS)</div>
      <textarea id="codeEditor" style="display: none;"></textarea>
      <div id="codeMirrorContainer" style="height: 100%;"></div>
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="preview-panel" id="previewPanel">
      <div class="panel-header"><span class="iconify" data-icon="mdi:monitor-shimmer"></span> LIVE PREVIEW • INSTANT</div>
      <iframe id="previewFrame" class="preview-frame" title="live output" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    </div>
  </div>
</div>

<!-- MODAL: 3 COLUMN GRID INFINITE SCROLL -->
<div id="snippetsModal" class="modal-overlay">
  <div class="modal-container">
    <div class="modal-header">
      <h2><span class="iconify" data-icon="mdi:database-outline"></span> SNIPPET VAULT • 3 COLUMN GRID</h2>
      <input type="text" id="modalSearchInput" class="modal-search" placeholder="🔍 Search by name... (300ms)" autocomplete="off">
      <button id="closeModalBtn" class="close-modal">✕</button>
    </div>
    <div id="snippetsGridContainer" class="snippets-grid">
      <div class="empty-grid">✨ Loading snippets from Firebase...</div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyAtHa9wAryji3EdWwhxT7tUwZquRD-LJvI",
    authDomain: "project-k-dbaef.firebaseapp.com",
    projectId: "project-k-dbaef",
    storageBucket: "project-k-dbaef.firebasestorage.app",
    messagingSenderId: "356936578912",
    appId: "1:356936578912:web:056bdbf8625b33d79e1005",
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const snippetsCollection = collection(db, "snippets");
  
  let codeMirror = null;
  const previewFrame = document.getElementById("previewFrame");
  const runBtn = document.getElementById("runBtn");
  const saveBtn = document.getElementById("saveSnippetBtn");
  const allSnippetsBtn = document.getElementById("allSnippetsBtn");
  const snippetNameInput = document.getElementById("snippetNameInput");
  const modal = document.getElementById("snippetsModal");
  const modalSearch = document.getElementById("modalSearchInput");
  const snippetsGrid = document.getElementById("snippetsGridContainer");
  const closeModalBtn = document.getElementById("closeModalBtn");
  
  let currentEditId = null;
  let allSnippetsArray = [];
  let searchTimeout = null;
  
  // ---------- RESIZER LOGIC (no stacking bugs) ----------
  const editorPanel = document.getElementById("editorPanel");
  const previewPanel = document.getElementById("previewPanel");
  const resizeHandle = document.getElementById("resizeHandle");
  let isResizing = false;
  
  function initResize() {
    const container = document.getElementById("resizableContainer");
    resizeHandle.addEventListener("mousedown", (e) => {
      isResizing = true;
      document.body.style.cursor = "col-resize";
      resizeHandle.classList.add("active");
      e.preventDefault();
    });
    window.addEventListener("mousemove", (e) => {
      if (!isResizing) return;
      const rect = container.getBoundingClientRect();
      let newWidth = e.clientX - rect.left;
      const minWidth = 260;
      const maxWidth = rect.width - 260;
      newWidth = Math.min(maxWidth, Math.max(minWidth, newWidth));
      const percent = (newWidth / rect.width) * 100;
      editorPanel.style.width = `${percent}%`;
      previewPanel.style.width = `${100 - percent}%`;
      if (codeMirror) codeMirror.refresh();
    });
    window.addEventListener("mouseup", () => {
      isResizing = false;
      document.body.style.cursor = "";
      resizeHandle.classList.remove("active");
    });
  }
  
  // ---------- EDITOR ----------
  function initEditor() {
    const textarea = document.getElementById("codeEditor");
    codeMirror = CodeMirror(document.getElementById("codeMirrorContainer"), {
      value: `<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #0a0a1a, #12121f);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', system-ui;
    }
    .glass-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 2rem;
      border: 1px solid rgba(59,130,246,0.4);
      text-align: center;
    }
    h1 { background: linear-gradient(135deg, #fff, #60a5fa); -webkit-background-clip: text; background-clip: text; color: transparent; }
    button { background: #3b82f6; border: none; padding: 12px 28px; border-radius: 40px; color: white; font-weight: bold; margin-top: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="glass-card">
    <h1>⚡ NovaCore Studio</h1>
    <p>Resizable panels • 3‑column snippet grid</p>
    <button onclick="alert('Interactive preview!')">Explore</button>
  </div>
</body>
</html>`,
      mode: "htmlmixed",
      theme: "material-darker",
      lineNumbers: true,
      autoCloseBrackets: true,
      matchBrackets: true,
      indentUnit: 2,
      tabSize: 2,
      lineWrapping: true
    });
  }
  
  function runPreview() {
    if (codeMirror) previewFrame.srcdoc = codeMirror.getValue();
  }
  
  function showToast(msg, isError = false) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerHTML = `<span class="iconify" data-icon="mdi:${isError ? 'alert-circle' : 'check-circle'}"></span> ${msg}`;
    if (isError) toast.style.borderLeftColor = "#ef4444";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2600);
  }
  
  async function saveCurrentSnippet() {
    const code = codeMirror.getValue();
    if (!code.trim()) { showToast("Cannot save empty code", true); return; }
    let name = snippetNameInput.value.trim();
    if (!name) name = `Snippet_${new Date().toLocaleTimeString()}`;
    try {
      if (currentEditId) {
        await updateDoc(doc(db, "snippets", currentEditId), { name, code, updatedAt: new Date().toISOString() });
        showToast(`✅ Updated "${name}"`);
        currentEditId = null;
      } else {
        await addDoc(snippetsCollection, { name, code, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
        showToast(`💾 Saved "${name}" to cloud`);
      }
      if (modal.classList.contains("active")) await loadAllSnippetsIntoGrid();
      await refreshCache();
    } catch (err) { showToast("Firebase error: " + err.message, true); }
  }
  
  async function refreshCache() {
    const q = query(snippetsCollection, orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    allSnippetsArray = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }
  
  // Render 3-column grid (infinite rows, scrollable)
  async function loadAllSnippetsIntoGrid(filterText = "") {
    if (!allSnippetsArray.length) await refreshCache();
    let filtered = [...allSnippetsArray];
    if (filterText.trim()) {
      const lower = filterText.toLowerCase();
      filtered = allSnippetsArray.filter(s => s.name && s.name.toLowerCase().includes(lower));
    }
    if (filtered.length === 0) {
      snippetsGrid.innerHTML = `<div class="empty-grid"><span class="iconify" data-icon="mdi:code-braces-off"></span> No snippets found. Create one in the editor!</div>`;
      return;
    }
    snippetsGrid.innerHTML = filtered.map(snippet => {
      const safeCode = (snippet.code || "").replace(/`/g, '&#96;').replace(/"/g, '&quot;');
      return `
        <div class="snippet-card-modal" data-id="${snippet.id}">
          <div class="card-preview-live">
            <iframe sandbox="allow-scripts allow-same-origin allow-popups" srcdoc="${safeCode}" loading="lazy"></iframe>
          </div>
          <div class="snippet-meta-modern">
            <span class="snippet-title"><span class="iconify" data-icon="mdi:code-json"></span> ${escapeHtml(snippet.name || "Unnamed")}</span>
            <button class="edit-snippet-btn" data-id="${snippet.id}">✏️ Edit</button>
          </div>
        </div>
      `;
    }).join("");
    
    document.querySelectorAll(".edit-snippet-btn").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        e.stopPropagation();
        const id = btn.getAttribute("data-id");
        await loadIntelligentEditor(id);
        closeModal();
      });
    });
    document.querySelectorAll(".snippet-card-modal").forEach(card => {
      card.addEventListener("click", async (e) => {
        if (e.target.classList.contains("edit-snippet-btn")) return;
        const id = card.getAttribute("data-id");
        await loadIntelligentEditor(id);
        closeModal();
      });
    });
  }
  
  async function loadIntelligentEditor(id) {
    try {
      const q = query(snippetsCollection);
      const snap = await getDocs(q);
      let target = null;
      snap.forEach(d => { if (d.id === id) target = { id: d.id, ...d.data() }; });
      if (target && target.code) {
        codeMirror.setValue(target.code);
        snippetNameInput.value = target.name || "";
        currentEditId = target.id;
        runPreview();
        showToast(`📂 Loaded: ${target.name || "snippet"}`);
      } else { showToast("Snippet missing", true); }
    } catch (err) { showToast("Failed to load", true); }
  }
  
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
  }
  
  // Modal control with BACK button text
  function openModal() {
    modal.classList.add("active");
    allSnippetsBtn.innerHTML = '<span class="iconify" data-icon="mdi:arrow-left"></span> BACK';
    loadAllSnippetsIntoGrid("");
    modalSearch.value = "";
  }
  function closeModal() {
    modal.classList.remove("active");
    allSnippetsBtn.innerHTML = '<span class="iconify" data-icon="mdi:code-braces-box"></span> ALL SNIPPETS';
  }
  
  allSnippetsBtn.addEventListener("click", () => { modal.classList.contains("active") ? closeModal() : openModal(); });
  closeModalBtn.addEventListener("click", closeModal);
  modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
  
  modalSearch.addEventListener("input", (e) => {
    if (searchTimeout) clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => { await loadAllSnippetsIntoGrid(e.target.value); }, 300);
  });
  
  runBtn.addEventListener("click", runPreview);
  saveBtn.addEventListener("click", saveCurrentSnippet);
  document.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); saveCurrentSnippet(); }
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); runPreview(); }
  });
  
  async function bootstrap() {
    initEditor();
    initResize();
    await refreshCache();
    runPreview();
  }
  bootstrap();
</script>
</body>
</html>
