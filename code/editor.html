<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PIReactive | Smart Code Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #000000;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #000000;
    }

    .top-bar {
      background: #050505;
      border-bottom: 1px solid #141414;
      padding: 14px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      z-index: 10;
    }

    .name-input-wrapper {
      flex: 1;
      max-width: 400px;
    }

    #snippetNameInput {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      padding: 10px 16px;
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 500;
      outline: none;
      transition: all 0.2s;
    }

    #snippetNameInput:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.1);
    }

    .action-buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 20px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0a0a0a;
      color: #cbd5e1;
      border: 1px solid #1f1f1f;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
      border: none;
    }
    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }

    .btn-success {
      background: #10b981;
      color: white;
      border: none;
    }
    .btn-success:hover { background: #059669; transform: translateY(-1px); }

    .btn-danger {
      border-color: #ef4444;
      color: #ef4444;
    }
    .btn-danger:hover { background: #ef4444; color: white; }

    .btn:hover:not(.btn-primary):not(.btn-success) { background: #141414; transform: translateY(-1px); }

    .resizable-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    .editor-panel {
      width: 50%;
      display: flex;
      flex-direction: column;
      background: #000000;
      overflow: hidden;
      min-width: 200px;
    }

    .preview-panel {
      width: 50%;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      overflow: hidden;
      min-width: 200px;
    }

    .resize-handle {
      width: 4px;
      background: #1a1a1a;
      cursor: col-resize;
      transition: background 0.15s;
      position: relative;
      flex-shrink: 0;
      z-index: 20;
    }
    .resize-handle:hover, .resize-handle.active {
      background: #3b82f6;
    }
    .resize-handle::after {
      content: '';
      position: absolute;
      top: 0;
      left: -6px;
      right: -6px;
      bottom: 0;
    }

    .panel-header {
      background: #050505;
      padding: 10px 20px;
      font-size: 11px;
      font-weight: 500;
      color: #6b7280;
      border-bottom: 1px solid #141414;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .CodeMirror {
      height: 100%;
      font-size: 13px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: #000000;
    }
    .CodeMirror-gutters {
      background: #000000;
      border-right: 1px solid #141414;
    }

    .preview-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: white;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-header {
      padding: 20px 32px;
      border-bottom: 1px solid #141414;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      background: #000000;
    }

    .modal-header h2 {
      color: #e2e8f0;
      font-size: 18px;
      font-weight: 500;
    }

    .modal-search {
      background: #0a0a0a;
      border: 1px solid #1f1f1f;
      padding: 10px 20px;
      border-radius: 10px;
      width: 300px;
      color: white;
      outline: none;
      font-size: 14px;
    }
    .modal-search:focus { border-color: #3b82f6; }

    .close-modal {
      background: #0a0a0a;
      border: 1px solid #1f1f1f;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 20px;
      transition: 0.2s;
    }
    .close-modal:hover { background: #1a1a1a; }

    .snippets-grid {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      align-content: start;
    }

    .snippet-card {
      background: #0a0a0a;
      border-radius: 16px;
      border: 1px solid #141414;
      overflow: hidden;
      transition: all 0.25s ease;
      cursor: pointer;
    }

    .snippet-card:hover {
      transform: translateY(-3px);
      border-color: #3b82f6;
    }

    .card-preview {
      background: #ffffff;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      position: relative;
    }

    .card-preview iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      pointer-events: none;
      transform: scale(0.7);
      transform-origin: 0 0;
      width: 143%;
      height: 143%;
    }

    .card-footer {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .snippet-name {
      color: #e2e8f0;
      font-weight: 500;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .edit-btn {
      background: #141414;
      border: none;
      padding: 4px 12px;
      border-radius: 8px;
      color: #90caf9;
      font-size: 11px;
      cursor: pointer;
    }
    .edit-btn:hover { background: #2563eb; color: white; }

    .empty-grid {
      color: #6b7280;
      text-align: center;
      padding: 60px;
      font-size: 14px;
      grid-column: 1 / -1;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #0a0a0a;
      border: 1px solid #1f1f1f;
      color: #a5f3fc;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 1200;
      border-left: 3px solid #3b82f6;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px);}
      to { opacity: 1; transform: translateX(0);}
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #050505; }
    ::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 10px; }

    @media (max-width: 900px) {
      .snippets-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 550px) {
      .snippets-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="name-input-wrapper">
      <input type="text" id="snippetNameInput" placeholder="Snippet name...">
    </div>
    <div class="action-buttons">
      <button id="runBtn" class="btn btn-primary"><span class="iconify" data-icon="mdi:play"></span> Run</button>
      <button id="saveBtn" class="btn"><span class="iconify" data-icon="mdi:content-save"></span> Save</button>
      <button id="addMarkBtn" class="btn btn-success"><span class="iconify" data-icon="mdi:plus-circle"></span> ADD MARK</button>
      <button id="resetBtn" class="btn btn-danger"><span class="iconify" data-icon="mdi:refresh"></span> Reset</button>
      <button id="allSnippetsBtn" class="btn"><span class="iconify" data-icon="mdi:grid"></span> Library</button>
    </div>
  </div>

  <div class="resizable-container" id="resizableContainer">
    <div class="editor-panel" id="editorPanel">
      <div class="panel-header"><span class="iconify" data-icon="mdi:code-tags"></span> Editor</div>
      <textarea id="codeEditor" style="display: none;"></textarea>
      <div id="codeMirrorContainer" style="height: 100%;"></div>
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="preview-panel" id="previewPanel">
      <div class="panel-header"><span class="iconify" data-icon="mdi:monitor-eye"></span> Preview</div>
      <iframe id="previewFrame" class="preview-frame" title="preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    </div>
  </div>
</div>

<div id="snippetsModal" class="modal-overlay">
  <div class="modal-header">
    <h2><span class="iconify" data-icon="mdi:database"></span> Snippet Library</h2>
    <input type="text" id="modalSearchInput" class="modal-search" placeholder="Search snippets..." autocomplete="off">
    <button id="closeModalBtn" class="close-modal">✕</button>
  </div>
  <div id="snippetsGridContainer" class="snippets-grid">
    <div class="empty-grid">Loading snippets...</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyAtHa9wAryji3EdWwhxT7tUwZquRD-LJvI",
    authDomain: "project-k-dbaef.firebaseapp.com",
    projectId: "project-k-dbaef",
    storageBucket: "project-k-dbaef.firebasestorage.app",
    messagingSenderId: "356936578912",
    appId: "1:356936578912:web:056bdbf8625b33d79e1005",
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const snippetsCollection = collection(db, "snippets");
  
  let codeMirror = null;
  const previewFrame = document.getElementById("previewFrame");
  const runBtn = document.getElementById("runBtn");
  const saveBtn = document.getElementById("saveBtn");
  const addMarkBtn = document.getElementById("addMarkBtn");
  const resetBtn = document.getElementById("resetBtn");
  const allSnippetsBtn = document.getElementById("allSnippetsBtn");
  const snippetNameInput = document.getElementById("snippetNameInput");
  const modal = document.getElementById("snippetsModal");
  const modalSearch = document.getElementById("modalSearchInput");
  const snippetsGrid = document.getElementById("snippetsGridContainer");
  const closeModalBtn = document.getElementById("closeModalBtn");
  
  let currentEditId = null;
  let allSnippetsArray = [];
  let searchTimeout = null;
  
  // UNIQUE RANDOM CLASS NAMES (no conflicts)
  const UNIQUE_CONTAINER = "pireactive_xk9f2j";
  const UNIQUE_LINK = "pireactive_7h3m8v";
  const UNIQUE_ARROW = "pireactive_qw4r6t";
  
  // Badge HTML with unique classes - NO BODY STYLES, ONLY THE BUTTON
  const BADGE_HTML = `
<div class="${UNIQUE_CONTAINER}">
  <style>
    .${UNIQUE_CONTAINER} {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 9999;
    }
    .${UNIQUE_LINK} {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      background: #1e1a18f0;
      color: #f0e4db;
      padding: 0.4rem 1rem 0.4rem 1.2rem;
      border: 1px solid #5e4b3e;
      box-shadow: 0 6px 12px -4px #00000033;
      transition: all 0.25s;
      backdrop-filter: blur(4px);
      font-size: 0.9rem;
      white-space: nowrap;
      border-radius: 60px;
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    }
    .${UNIQUE_LINK}:hover {
      background: #2d231e;
      border-color: #9c8170;
      transform: translateY(-2px);
    }
    .${UNIQUE_ARROW} {
      margin-left: 0.5rem;
      font-size: 1.3rem;
      transition: transform 0.25s;
      color: #d6bcab;
    }
    .${UNIQUE_LINK}:hover .${UNIQUE_ARROW} {
      transform: translate(2px, -7px) rotate(-20deg);
      color: #f0d5c3;
    }
  </style>
  <a href="https://pireactive.vercel.app/cool" target="_blank" rel="noopener noreferrer" class="${UNIQUE_LINK}">
    <span>Made by PIReactive</span>
    <span class="${UNIQUE_ARROW}">→</span>
  </a>
</div>`;
  
  // INTELLIGENT INJECTION - ONLY ADDS BADGE, PRESERVES EVERYTHING ELSE
  function injectPIReactiveMarkOnly(htmlCode) {
    if (!htmlCode || htmlCode.trim() === '') return htmlCode;
    
    // Check if badge already exists using unique class
    if (htmlCode.includes(UNIQUE_CONTAINER) && htmlCode.includes('Made by PIReactive')) {
      return htmlCode;
    }
    
    // Inject into </body> if exists (preserves all original content)
    if (htmlCode.includes('</body>')) {
      return htmlCode.replace('</body>', `${BADGE_HTML}\n</body>`);
    }
    // Inject into </html> if exists
    else if (htmlCode.includes('</html>')) {
      return htmlCode.replace('</html>', `${BADGE_HTML}\n</html>`);
    }
    // For fragments, append at the end
    else {
      return htmlCode + `\n${BADGE_HTML}`;
    }
  }
  
  const DEFAULT_CODE = `<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a1a, #12121f);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', system-ui;
    }
    .card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 2rem;
      border: 1px solid rgba(59,130,246,0.3);
      text-align: center;
    }
    h1 { background: linear-gradient(135deg, #fff, #60a5fa); -webkit-background-clip: text; background-clip: text; color: transparent; }
    button {
      background: #3b82f6;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      color: white;
      font-weight: 500;
      margin-top: 20px;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>PIReactive Editor</h1>
    <p>Write HTML/CSS/JS • Save to cloud</p>
    <button onclick="alert('Hello from PIReactive!')">Click me</button>
  </div>
</body>
</html>`;
  
  // Resizer logic
  const editorPanel = document.getElementById("editorPanel");
  const previewPanel = document.getElementById("previewPanel");
  const resizeHandle = document.getElementById("resizeHandle");
  let isResizing = false;
  
  function initResize() {
    const container = document.getElementById("resizableContainer");
    resizeHandle.addEventListener("mousedown", (e) => {
      isResizing = true;
      document.body.style.cursor = "col-resize";
      resizeHandle.classList.add("active");
      e.preventDefault();
    });
    window.addEventListener("mousemove", (e) => {
      if (!isResizing) return;
      const rect = container.getBoundingClientRect();
      let newWidth = e.clientX - rect.left;
      const minWidth = 280;
      const maxWidth = rect.width - 280;
      newWidth = Math.min(maxWidth, Math.max(minWidth, newWidth));
      const percent = (newWidth / rect.width) * 100;
      editorPanel.style.width = `${percent}%`;
      previewPanel.style.width = `${100 - percent}%`;
      if (codeMirror) codeMirror.refresh();
    });
    window.addEventListener("mouseup", () => {
      isResizing = false;
      document.body.style.cursor = "";
      resizeHandle.classList.remove("active");
    });
  }
  
  function initEditor() {
    const textarea = document.getElementById("codeEditor");
    codeMirror = CodeMirror(document.getElementById("codeMirrorContainer"), {
      value: DEFAULT_CODE,
      mode: "htmlmixed",
      theme: "material-darker",
      lineNumbers: true,
      autoCloseBrackets: true,
      matchBrackets: true,
      indentUnit: 2,
      tabSize: 2,
      lineWrapping: true
    });
  }
  
  function runPreview() {
    if (codeMirror) previewFrame.srcdoc = codeMirror.getValue();
  }
  
  function resetEditor() {
    if (confirm("Reset editor to default template?")) {
      codeMirror.setValue(DEFAULT_CODE);
      snippetNameInput.value = "";
      currentEditId = null;
      runPreview();
      showToast("Reset to default template", false);
    }
  }
  
  // ADD MARK - ANALYZES FIRST, THEN INJECTS WITHOUT CHANGING ANYTHING ELSE
  function addPIReactiveMark() {
    const currentCode = codeMirror.getValue();
    if (!currentCode.trim()) {
      showToast("No code to mark", true);
      return;
    }
    
    // AI-like analysis: check if badge already exists
    if (currentCode.includes(UNIQUE_CONTAINER) && currentCode.includes('Made by PIReactive')) {
      showToast("✓ PIReactive mark already present in this code!", false);
      return;
    }
    
    // Also check for old badge patterns
    if (currentCode.includes('badge-fixed') && currentCode.includes('Made by PIReactive')) {
      showToast("⚠️ Legacy badge found. Use Reset to get clean version.", true);
      return;
    }
    
    try {
      const newCode = injectPIReactiveMarkOnly(currentCode);
      codeMirror.setValue(newCode);
      runPreview();
      showToast("✨ PIReactive badge added! Fixed at bottom-right corner. Original code unchanged.", false);
    } catch (err) {
      console.error(err);
      showToast("Failed to inject mark: " + err.message, true);
    }
  }
  
  function showToast(msg, isError = false) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerHTML = msg;
    if (isError) toast.style.borderLeftColor = "#ef4444";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  async function setButtonLoading(button, loading) {
    if (loading) {
      button._originalText = button.innerHTML;
      button.innerHTML = '<span class="loading-spinner"></span> Saving...';
      button.disabled = true;
    } else {
      button.innerHTML = button._originalText || '<span class="iconify" data-icon="mdi:content-save"></span> Save';
      button.disabled = false;
    }
  }
  
  async function saveCurrentSnippet() {
    const code = codeMirror.getValue();
    if (!code.trim()) { showToast("Cannot save empty code", true); return; }
    let name = snippetNameInput.value.trim();
    if (!name) name = `Snippet_${new Date().toLocaleTimeString()}`;
    
    try {
      await setButtonLoading(saveBtn, true);
      if (currentEditId) {
        await updateDoc(doc(db, "snippets", currentEditId), { name, code, updatedAt: new Date().toISOString() });
        showToast(`✅ Updated "${name}"`);
        currentEditId = null;
      } else {
        await addDoc(snippetsCollection, { name, code, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
        showToast(`💾 Saved "${name}"`);
      }
      if (modal.classList.contains("active")) await loadAllSnippetsIntoGrid();
      await refreshCache();
    } catch (err) { showToast("Firebase error: " + err.message, true); }
    finally { await setButtonLoading(saveBtn, false); }
  }
  
  async function refreshCache() {
    const q = query(snippetsCollection, orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    allSnippetsArray = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }
  
  async function loadAllSnippetsIntoGrid(filterText = "") {
    snippetsGrid.innerHTML = '<div class="empty-grid"><span class="loading-spinner" style="border-color:#3b82f6; border-top-color:white;"></span> Loading...</div>';
    if (!allSnippetsArray.length) await refreshCache();
    let filtered = [...allSnippetsArray];
    if (filterText.trim()) {
      const lower = filterText.toLowerCase();
      filtered = allSnippetsArray.filter(s => s.name && s.name.toLowerCase().includes(lower));
    }
    if (filtered.length === 0) {
      snippetsGrid.innerHTML = `<div class="empty-grid">✨ No snippets. Create one in the editor!</div>`;
      return;
    }
    snippetsGrid.innerHTML = filtered.map(snippet => {
      const safeCode = (snippet.code || "").replace(/`/g, '&#96;').replace(/"/g, '&quot;');
      return `
        <div class="snippet-card" data-id="${snippet.id}">
          <div class="card-preview">
            <iframe sandbox="allow-scripts allow-same-origin" srcdoc="${safeCode}" loading="lazy"></iframe>
          </div>
          <div class="card-footer">
            <span class="snippet-name">📄 ${escapeHtml(snippet.name || "Unnamed")}</span>
            <button class="edit-btn" data-id="${snippet.id}">Edit</button>
          </div>
        </div>
      `;
    }).join("");
    
    document.querySelectorAll(".edit-btn").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        e.stopPropagation();
        const id = btn.getAttribute("data-id");
        await loadIntelligentEditor(id);
        closeModal();
      });
    });
    document.querySelectorAll(".snippet-card").forEach(card => {
      card.addEventListener("click", async (e) => {
        if (e.target.classList.contains("edit-btn")) return;
        const id = card.getAttribute("data-id");
        await loadIntelligentEditor(id);
        closeModal();
      });
    });
  }
  
  async function loadIntelligentEditor(id) {
    try {
      const q = query(snippetsCollection);
      const snap = await getDocs(q);
      let target = null;
      snap.forEach(d => { if (d.id === id) target = { id: d.id, ...d.data() }; });
      if (target && target.code) {
        codeMirror.setValue(target.code);
        snippetNameInput.value = target.name || "";
        currentEditId = target.id;
        runPreview();
        showToast(`📂 Loaded: ${target.name || "snippet"}`);
      } else { showToast("Snippet not found", true); }
    } catch (err) { showToast("Failed to load", true); }
  }
  
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
  }
  
  function openModal() {
    modal.classList.add("active");
    allSnippetsBtn.innerHTML = '<span class="iconify" data-icon="mdi:arrow-left"></span> Back';
    loadAllSnippetsIntoGrid("");
    modalSearch.value = "";
  }
  function closeModal() {
    modal.classList.remove("active");
    allSnippetsBtn.innerHTML = '<span class="iconify" data-icon="mdi:grid"></span> Library';
  }
  
  allSnippetsBtn.addEventListener("click", () => { modal.classList.contains("active") ? closeModal() : openModal(); });
  closeModalBtn.addEventListener("click", closeModal);
  modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
  
  modalSearch.addEventListener("input", (e) => {
    if (searchTimeout) clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => { await loadAllSnippetsIntoGrid(e.target.value); }, 300);
  });
  
  runBtn.addEventListener("click", runPreview);
  saveBtn.addEventListener("click", saveCurrentSnippet);
  addMarkBtn.addEventListener("click", addPIReactiveMark);
  resetBtn.addEventListener("click", resetEditor);
  
  document.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); saveCurrentSnippet(); }
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); runPreview(); }
    if ((e.ctrlKey || e.metaKey) && e.key === "m") { e.preventDefault(); addPIReactiveMark(); }
  });
  
  async function bootstrap() {
    initEditor();
    initResize();
    await refreshCache();
    runPreview();
  }
  bootstrap();
</script>
</body>
</html>
